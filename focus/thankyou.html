<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #e8f0fb 0, transparent 34%),
        radial-gradient(circle at bottom right, #f4f0ff 0, transparent 32%),
        #f6f8fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      max-width: 720px;
      background: white;
      border: 1px solid #d9e1ea;
      border-radius: 28px;
      padding: 42px;
      text-align: center;
      box-shadow: 0 20px 46px rgba(15, 23, 42, 0.10);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 36px;
      line-height: 1.2;
      font-weight: 850;
      color: #0f172a;
    }

    p {
      margin: 0;
      color: #667085;
      font-size: 16px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Thank you for participating</h1>
    <p>
      Your responses have been recorded for this research study.
      Thank you for taking the time to support this work.
    </p>
  </main>
</body>
</html>
